<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAM Store - Online RAM Orders</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔥 RAM Store</h1>
            <p>Premium RAM modules for your system</p>
        </header>

        <!-- RAM Catalog -->
        <section class="section">
            <h2>Available RAMs</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>RAM Details</th>
                            <th>Price</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="ramBody"></tbody>
                </table>
            </div>
        </section>

        <!-- Order Form -->
        <section class="section">
            <h2>Place Order</h2>
            <div class="form-grid">
                <input type="text" id="customerName" placeholder="Your Name" required>
                <input type="email" id="customerEmail" placeholder="Your Email" required>
                <select id="ramSelect"></select>
                <input type="number" id="quantity" placeholder="Quantity" min="1" value="1">
                <button onclick="placeOrder()">Place Order</button>
            </div>
            <div id="orderMsg" class="message"></div>
        </section>

        <!-- Orders List -->
        <section class="section">
            <h2>Recent Orders</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Customer</th>
                            <th>RAM</th>
                            <th>Qty</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="orderBody"></tbody>
                </table>
            </div>
        </section>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="mName"></h2>
            <div class="modal-grid">
                <div><strong>Brand:</strong> <span id="mBrand"></span></div>
                <div><strong>DDR Type:</strong> <span id="mDdr"></span></div>
                <div><strong>Speed:</strong> <span id="mSpeed"></span></div>
                <div><strong>Capacity:</strong> <span id="mCap"></span></div>
                <div><strong>Warranty:</strong> <span id="mWarranty"></span></div>
                <div><strong>Price:</strong> <span id="mPrice"></span></div>
                <div><strong>Stock:</strong> <span id="mStock"></span></div>
            </div>

            <!-- Reviews Section -->
            <div class="reviews-section">
                <h3>Customer Reviews</h3>
                <div id="reviewsList"></div>
                
                <h4>Add Your Review</h4>
                <div class="review-form">
                    <input type="text" id="reviewName" placeholder="Your Name">
                    <select id="reviewRating">
                        <option value="5">⭐⭐⭐⭐⭐ (5 stars)</option>
                        <option value="4">⭐⭐⭐⭐ (4 stars)</option>
                        <option value="3">⭐⭐⭐ (3 stars)</option>
                        <option value="2">⭐⭐ (2 stars)</option>
                        <option value="1">⭐ (1 star)</option>
                    </select>
                    <textarea id="reviewComment" placeholder="Write your review..."></textarea>
                    <button onclick="submitReview()">Submit Review</button>
                </div>
            </div>
        </div>
    </div>

    <script src="components/scrollToTop.js"></script>
    <script src="app-production.js"></script>
</body>
</html>
